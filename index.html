<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Insta</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 90%;
    max-width: 350px;
    background: #1c1c1c;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.register {
    background: #00c853;
    color: white;
}

.login {
    background: #444;
    color: white;
}
</style>
</head>

<body>

<div class="container">
    <h1>Mini Insta</h1>

    <input type="email" placeholder="Correo">
    <input type="password" placeholder="Contraseña">

    <button class="register">Registrarse</button>
    <button class="login">Iniciar sesión</button>
</div>

</body>
</html>
